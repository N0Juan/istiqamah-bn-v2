version: '3.8'

services:
  api:
    build: .
    container_name: istiqamah-bn-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - prayer_data:/app/data
    environment:
      - TZ=Asia/Brunei
      - DATABASE_PATH=/app/data/prayer_times.db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  prayer_data:
    driver: local
