version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: istiqamah-backend
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/prayer_times.db
      - LOG_DIR=/app/logs
    restart: unless-stopped
    networks:
      - istiqamah-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  # Frontend Webapp Service
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: istiqamah-webapp
    ports:
      - "53431:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - istiqamah-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

networks:
  istiqamah-network:
    driver: bridge

volumes:
  backend-data:
  backend-logs:
