version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: istiqamah-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    environment:
      - DATABASE_PATH=/app/data/prayer_times.db
      - LOG_DIR=/app/logs
    restart: unless-stopped
    networks:
      - istiqamah-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Webapp Service
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: istiqamah-webapp
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - istiqamah-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  istiqamah-network:
    driver: bridge

volumes:
  backend-data:
  backend-logs:
