# SwiftLint Configuration for IstiqamahBN
# https://github.com/realm/SwiftLint

# Paths to exclude from linting
excluded:
  - Pods
  - .build
  - DerivedData
  - .swiftpm
  - IstiqamahBNTests
  - IstiqamahBNUITests

# Enabled rules
opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
  - multiline_arguments
  - multiline_parameters
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_parameter_alignment_on_call

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - line_length # Handled by formatter

# Rule configurations
file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - i
    - j
    - db

large_tuple:
  warning: 3
  error: 4

# Custom rules
custom_rules:
  no_print:
    name: "No Print Statements"
    regex: "print\\("
    message: "Use Logger instead of print()"
    severity: warning
