server {
    listen 80;
    server_name localhost;
    server_tokens off;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # Service Worker needs correct MIME type
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        include /etc/nginx/conf.d/security-headers.inc;
        types {
            application/javascript js;
        }
    }

    # Manifest with correct MIME type
    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/conf.d/security-headers.inc;
        types {
            application/manifest+json json;
        }
    }

    # Block robots from admin
    location = /robots.txt {
        add_header Content-Type "text/plain";
        return 200 "User-agent: *\nDisallow: /admin/\n";
    }

    # Admin panel - no cache
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri $uri/ /admin/index.html;
    }

    # Push subscribe/unsubscribe/update-settings — rate limited
    location ~ ^/api/v1/push/(subscribe|unsubscribe|update-settings)$ {
        limit_req zone=api_push burst=3 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Push admin endpoints — rate limited
    location ~ ^/api/v1/push/(send|subscribers)$ {
        limit_req zone=api_push burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # API proxy to backend — rate limited
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Static files with caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # HTML files - no cache for SPA
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
